<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest · NYC Trip</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg:        #0f1117;
      --card:      #1a1f2e;
      --border:    #252d3d;
      --border-lt: #2d3a52;
      --accent:    #f5c842;
      --text:      #e8ecf3;
      --muted:     #8b97b0;
      --faint:     #3d4a62;
      --pinterest: #e60023;
      --nav-h:     46px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── TOP NAV ── */
    .topnav {
      height: var(--nav-h);
      background: #0a0d14;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 6px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .topnav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      margin-right: 10px;
      white-space: nowrap;
    }
    .topnav-brand em { font-style: italic; color: var(--accent); }
    .topnav-sep { width: 1px; height: 18px; background: var(--border-lt); margin: 0 6px; flex-shrink: 0; }
    .nav-link {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 8px;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em;
      color: var(--muted); text-decoration: none; transition: all 0.15s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-link.active { color: var(--accent); background: rgba(245,200,66,0.08); }
    .nav-link .nav-icon { font-size: 0.95rem; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 700;
      line-height: 1.1;
    }

    .page-header h1 em { font-style: italic; color: var(--pinterest); }

    .page-header p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: var(--pinterest);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover { opacity: 0.85; }

    /* ── GRID ── */
    #boards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }

    /* ── BOARD CARD ── */
    .board-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .board-card:hover {
      transform: translateY(-3px);
      border-color: var(--pinterest);
      box-shadow: 0 8px 30px rgba(230,0,35,0.15);
    }

    .board-thumb {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #2a0a0f 0%, #3d1420 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .board-body { padding: 14px 16px 16px; }

    .board-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .board-meta {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .board-meta .by { color: var(--faint); }

    .board-arrow {
      position: absolute;
      top: 12px; right: 12px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(230,0,35,0.15);
      border: 1px solid rgba(230,0,35,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: var(--pinterest);
    }

    .board-delete {
      position: absolute;
      bottom: 12px; right: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.65rem;
      padding: 3px 8px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .board-card:hover .board-delete { opacity: 1; }
    .board-delete:hover { color: var(--food); border-color: rgba(232,113,90,0.4); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 32px;
      color: var(--faint);
    }

    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 14px; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      z-index: 3000;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 20px;
    }
    #modal-overlay.visible { display: flex; }

    .modal-card {
      background: var(--card);
      border: 1px solid var(--border-lt);
      border-radius: 18px;
      width: 100%; max-width: 400px;
      padding: 28px;
      position: relative;
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { opacity:0; transform: scale(0.93) translateY(14px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    .modal-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700; margin-bottom: 6px;
    }
    .modal-card h2 em { font-style: italic; color: var(--pinterest); }
    .modal-sub { font-size: 0.74rem; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); font-size: 0.8rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: rgba(0,0,0,0.8); }

    .form-group { margin-bottom: 13px; }
    .form-label {
      display: block; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; background: #0f1117;
      border: 1px solid var(--border-lt); border-radius: 9px;
      padding: 9px 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.83rem;
      transition: border-color 0.15s; outline: none;
    }
    .form-input:focus { border-color: var(--pinterest); }
    .modal-error { font-size: 0.73rem; color: var(--food); margin-bottom: 12px; display: none; }
    .modal-error.visible { display: block; }
    .modal-submit {
      width: 100%; padding: 11px;
      background: var(--pinterest); border: none; border-radius: 10px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-submit:hover { opacity: 0.85; }
    .modal-submit:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="index.html">NYC <em>Trip</em></a>
  <div class="topnav-sep"></div>
  <a class="nav-link" href="index.html"><span class="nav-icon">🗺️</span> Map</a>
  <a class="nav-link" href="itinerary.html"><span class="nav-icon">📋</span> Itinerary</a>
  <a class="nav-link active" href="pinterest.html"><span class="nav-icon">📌</span> Pinterest</a>
  <a class="nav-link" href="tiktok.html"><span class="nav-icon">🎵</span> TikTok</a>
</nav>

<div class="page-header">
  <div>
    <h1>Pinterest <em>Boards</em></h1>
    <p>Inspo boards for the trip — click any card to open on Pinterest.</p>
  </div>
  <button class="add-btn" id="open-modal">📌 Add Board</button>
</div>

<div id="boards-grid"></div>

<!-- ADD BOARD MODAL -->
<div id="modal-overlay">
  <div class="modal-card">
    <button class="modal-close" id="close-modal">✕</button>
    <h2>Add a <em>Board</em></h2>
    <p class="modal-sub">Paste any Pinterest board or pin URL.</p>

    <div class="form-group">
      <label class="form-label" for="p-name">Board name</label>
      <input class="form-input" id="p-name" type="text" placeholder="e.g. NYC Outfits" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label" for="p-url">Pinterest URL</label>
      <input class="form-input" id="p-url" type="url" placeholder="https://pinterest.com/…">
    </div>
    <div class="form-group">
      <label class="form-label" for="p-person">Added by</label>
      <input class="form-input" id="p-person" type="text" placeholder="Your name" autocomplete="off">
    </div>

    <div class="modal-error" id="p-error"></div>
    <button class="modal-submit" id="p-submit">Save Board →</button>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCe4jMzTvSSmOnvNJwMR3ku7oP89TouXsY",
  authDomain: "nyc-trip-71a08.firebaseapp.com",
  databaseURL: "https://nyc-trip-71a08-default-rtdb.firebaseio.com",
  projectId: "nyc-trip-71a08",
  storageBucket: "nyc-trip-71a08.firebasestorage.app",
  messagingSenderId: "770213467859",
  appId: "1:770213467859:web:f005acc598769aebb5a626"
});
const db = firebase.database();

const grid    = document.getElementById('boards-grid');
const overlay = document.getElementById('modal-overlay');

// ── RENDER ────────────────────────────────────────────────────────────────
db.ref('pinterest').on('value', snapshot => {
  grid.innerHTML = '';
  const boards = [];
  snapshot.forEach(child => boards.push({ key: child.key, ...child.val() }));

  if (boards.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📌</span>
        <p>No boards yet.<br>Hit <strong>Add Board</strong> to save your first Pinterest inspo.</p>
      </div>`;
    return;
  }

  boards.forEach(b => {
    const card = document.createElement('a');
    card.className = 'board-card';
    card.href = b.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.innerHTML = `
      <div class="board-thumb">📌</div>
      <div class="board-arrow">↗</div>
      <div class="board-body">
        <div class="board-name">${escHtml(b.name)}</div>
        <div class="board-meta">
          ${b.person ? `<span class="by">by ${escHtml(b.person)}</span>` : ''}
        </div>
      </div>
      <button class="board-delete" data-key="${b.key}">Delete</button>
    `;
    card.querySelector('.board-delete').addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      if (confirm(`Delete "${b.name}"?`)) db.ref(`pinterest/${b.key}`).remove();
    });
    grid.appendChild(card);
  });
});

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal()  { overlay.classList.add('visible'); }
function closeModal() {
  overlay.classList.remove('visible');
  ['p-name','p-url','p-person'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-error').classList.remove('visible');
  document.getElementById('p-submit').disabled = false;
}

document.getElementById('open-modal').addEventListener('click', openModal);
document.getElementById('close-modal').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('p-submit').addEventListener('click', async () => {
  const name   = document.getElementById('p-name').value.trim();
  const url    = document.getElementById('p-url').value.trim();
  const person = document.getElementById('p-person').value.trim();
  const errEl  = document.getElementById('p-error');
  errEl.classList.remove('visible');

  if (!name || !url) {
    errEl.textContent = 'Name and URL are required.';
    errEl.classList.add('visible');
    return;
  }

  if (!url.includes('pinterest.')) {
    errEl.textContent = 'Please enter a valid Pinterest URL.';
    errEl.classList.add('visible');
    return;
  }

  await db.ref('pinterest').push({ name, url, person, addedAt: Date.now() });
  closeModal();
});

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
